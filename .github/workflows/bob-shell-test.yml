name: Bob Shell CI Test

on:
  issues:
    types: [opened, labeled]
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Custom prompt for Bob Shell (leave empty to use default behavior)'
        required: false
      issue_number:
        description: 'Issue number to fix (leave empty for default behavior)'
        required: false

jobs:
  bob-shell-test:
    runs-on: ubuntu-latest
    name: Run Bob Shell Analysis with GitHub MCP
    
    steps:
      - name: Checkout repository (for action definition only)
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/actions/bob-shell
          sparse-checkout-cone-mode: false
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Set Prompt
        id: set-prompt
        run: |
          if [[ "${{ github.event_name }}" == "issues" ]]; then
            # Triggered by issue event
            ISSUE_NUM="${{ github.event.issue.number }}"
            PROMPT="Research and fix the security vulnerability in: https://github.com/${{ github.repository }}/issues/${ISSUE_NUM} Independently analyze the CVE, determine the best fix strategy, implement the solution, and create a comprehensive pull request following @BOB_PROMPT.md"
          elif [[ -n "${{ github.event.inputs.issue_number }}" ]]; then
            # Manual workflow dispatch with issue number
            ISSUE_NUM="${{ github.event.inputs.issue_number }}"
            PROMPT="Research and fix the security vulnerability in: https://github.com/${{ github.repository }}/issues/${ISSUE_NUM} Independently analyze the CVE, determine the best fix strategy, implement the solution, and create a comprehensive pull request following @BOB_PROMPT.md"
          elif [[ -n "${{ github.event.inputs.prompt }}" ]]; then
            # Manual workflow dispatch with custom prompt
            PROMPT="${{ github.event.inputs.prompt }}"
          else
            # Default prompt for push/PR events
            PROMPT="Use GitHub MCP to access this repository and analyze its structure. List the main files and directories, and describe what this project does based on the README and code files you can access through GitHub MCP."
          fi
          echo "prompt<<EOF" >> $GITHUB_OUTPUT
          echo "$PROMPT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Run Bob Shell with GitHub MCP
        id: bob-shell
        uses: ./.github/actions/bob-shell
        with:
          bobshell_api_key: ${{ secrets.BOBSHELL_API_KEY }}
          bobshell_debug: true
          mcp: ${{ secrets.BOBSHELL_MCP_CONFIG }}
          prompt: ${{ steps.set-prompt.outputs.prompt }}
      
      - name: Display Bob Shell Output
        if: always()
        run: |
          echo "## 🤖 Bob Shell Analysis Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -n "${{ steps.bob-shell.outputs.summary }}" ]; then
            echo "### 📝 Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "${{ steps.bob-shell.outputs.summary }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -n "${{ steps.bob-shell.outputs.error }}" ]; then
            echo "### ⚠️ Errors" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "${{ steps.bob-shell.outputs.error }}" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

# Made with Bob
