name: Bob Shell CI Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Custom prompt for Bob Shell'
        required: false
        default: 'Analyze this repository and provide a summary of its structure and purpose.'

jobs:
  bob-shell-test:
    runs-on: ubuntu-latest
    name: Run Bob Shell Analysis with GitHub MCP
    
    steps:
      - name: Checkout repository (for action definition only)
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/actions/bob-shell
          sparse-checkout-cone-mode: false
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Run Bob Shell with GitHub MCP
        uses: ./.github/actions/bob-shell
        with:
          bobshell_api_key: ${{ secrets.BOBSHELL_API_KEY }}
          bobshell_debug: false
          prompt: ${{ github.event.inputs.prompt || 'Use GitHub MCP to access this repository and analyze its structure. List the main files and directories, and describe what this project does based on the README and code files you can access through GitHub MCP.' }}
      
      - name: Display Bob Shell Output
        if: always()
        run: |
          echo "### Bob Shell Analysis Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See the logs above for detailed output from Bob Shell." >> $GITHUB_STEP_SUMMARY

# Made with Bob
